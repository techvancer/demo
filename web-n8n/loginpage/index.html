<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Teacher Login</title>
  <link rel="stylesheet" href="/loginpage/style.css">
</head>

<body>

  <div class="overlay">
    <div class="login-card">

      <h2>Login</h2>

      <form>
        <div class="input-group">
          <label>Email</label>
          <input id="email" type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input id="password" type="password" placeholder="Enter your password" required>
        </div>

        <div class="options">
          <label>
            <input type="checkbox">
            Remember me
          </label>
        </div>


      </form>
      <button type="button" class="login-btn" id="loginBtn">Login</button>
    </div>
  </div>
  <script type="module" src="/loginpage/login.js"></script>
  <img id="watermark" src="/loginpage/WaterMark.png" alt="TechVancer Logo" />
</body>

</html>
